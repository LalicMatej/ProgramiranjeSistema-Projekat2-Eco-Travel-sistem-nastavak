spring.application.name=booking-service
server.port=8084
server.error.include-message=always

spring.datasource.url=jdbc:mysql://localhost:3307/bookingdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=optional:classpath:/disabled-schema.sql
spring.sql.init.data-locations=classpath:data.sql

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
management.tracing.propagation.type=w3c
management.tracing.sampling.probability=1.0

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
