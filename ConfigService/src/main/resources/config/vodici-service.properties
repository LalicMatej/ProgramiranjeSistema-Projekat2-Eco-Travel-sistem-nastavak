# Swagger dokumentacija (interfejs za testiranje endpointa)
# Putanja: http://localhost:8087/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.api-docs.path=/api/vodici/v3/api-docs

# Avanture service
avanture.service.url=http://avanture-service:8086

# Feign
feign.client.config.default.connect-timeout=3000
feign.client.config.default.read-timeout=3000
logging.level.org.springframework.cloud.openfeign=WARN

# Resilience4j CircuitBreaker - Avanture
resilience4j.circuitbreaker.instances.avantureService.sliding-window-size=5
resilience4j.circuitbreaker.instances.avantureService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.avantureService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.avantureService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.avantureService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.avantureService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.avantureService.register-health-indicator=true
resilience4j.ratelimiter.instances.avantureServiceRateLimit.limit-for-period=10
resilience4j.ratelimiter.instances.avantureServiceRateLimit.limit-refresh-period=1s
resilience4j.ratelimiter.instances.avantureServiceRateLimit.timeout-duration=100ms

# Resilience4j Retry - Avanture
resilience4j.retry.instances.avantureService.max-attempts=3
resilience4j.retry.instances.avantureService.wait-duration=2s
resilience4j.retry.instances.avantureService.retry-exceptions=java.io.IOException,feign.FeignException


# Dozvoljava Swagger-u sa porta 8080 da povuce dokumentaciju
springdoc.api-docs.enabled=true
springdoc.server.url=http://localhost:8083
management.endpoints.web.cors.allowed-origins=http://localhost:8083
management.endpoints.web.cors.allowed-methods=GET,POST,PUT,DELETE

# Objedinjeni Actuator endpointi (za zdravlje, CB i refresh configa)
management.endpoints.web.exposure.include=health,circuitbreakers,refresh
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=w3c
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
loki.url=http://loki:3100/loki/api/v1/push
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/
eureka.instance.prefer-ip-address=true

custom.welcome-message=Dobrodosli u Vodici sistem!
logging.pattern.level=%5p [traceId:%X{traceId:-}] [spanId:%X{spanId:-}] [user:%X{authenticatedUser:-anonymous}] [role:%X{userRole:-unknown}]


