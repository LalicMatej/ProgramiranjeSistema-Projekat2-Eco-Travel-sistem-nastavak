# Remote service URL (used by SmestajClient)
odrzavanje.smestaj.url=http://smestaj:8081

# Actuator
management.endpoints.web.exposure.include=health,circuitbreakers,circuitbreakerevents,ratelimiters,refresh
management.endpoint.health.show-details=always
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
management.tracing.propagation.type=w3c

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.odrzavanjemikroservis=DEBUG

# Circuit Breaker
resilience4j.circuitbreaker.instances.smestajService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.smestajService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.smestajService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.smestajService.waitDurationInOpenState=10000
resilience4j.circuitbreaker.instances.smestajService.permittedNumberOfCallsInHalfOpenState=3

# Retry
resilience4j.retry.instances.smestajService.maxAttempts=3
resilience4j.retry.instances.smestajService.waitDuration=500ms

# Timelimiter
resilience4j.timelimiter.instances.smestajService.timeoutDuration=5s

# Rate Limiters
resilience4j.ratelimiter.instances.createWorkOrder.limit-for-period=5
resilience4j.ratelimiter.instances.createWorkOrder.limit-refresh-period=60s
resilience4j.ratelimiter.instances.createWorkOrder.timeout-duration=0s

resilience4j.ratelimiter.instances.updateWorkOrderStatus.limit-for-period=10
resilience4j.ratelimiter.instances.updateWorkOrderStatus.limit-refresh-period=60s
resilience4j.ratelimiter.instances.updateWorkOrderStatus.timeout-duration=0s

resilience4j.ratelimiter.instances.createMaintenanceTask.limit-for-period=3
resilience4j.ratelimiter.instances.createMaintenanceTask.limit-refresh-period=60s
resilience4j.ratelimiter.instances.createMaintenanceTask.timeout-duration=0s

resilience4j.ratelimiter.instances.createWorker.limit-for-period=3
resilience4j.ratelimiter.instances.createWorker.limit-refresh-period=60s
resilience4j.ratelimiter.instances.createWorker.timeout-duration=0s

# Eureka - service registry
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka/}
