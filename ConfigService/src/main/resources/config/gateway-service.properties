# Server
server.port=8083

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config

# Eureka - service discovery + load balancing
spring.cloud.discovery.enabled=true
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka/}

# Routes - Smestaj (lb:// → round-robin po instancama)
spring.cloud.gateway.routes[0].id=smestaj-service
spring.cloud.gateway.routes[0].uri=lb://smestaj-mikroservis
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/units/**

# Routes - Odrzavanje work orders (lb:// → load balanced)
spring.cloud.gateway.routes[1].id=odrzavanje-workorder
spring.cloud.gateway.routes[1].uri=lb://odrzavanje
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/workOrder/**

# Routes - Odrzavanje workers
spring.cloud.gateway.routes[2].id=odrzavanje-worker
spring.cloud.gateway.routes[2].uri=lb://odrzavanje
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/worker/**

# Routes - Odrzavanje maintenance tasks
spring.cloud.gateway.routes[3].id=odrzavanje-maintenancetask
spring.cloud.gateway.routes[3].uri=lb://odrzavanje
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/maintenanceTask/**

# Routes - Odrzavanje maintenance logs
spring.cloud.gateway.routes[12].id=odrzavanje-maintenancelog
spring.cloud.gateway.routes[12].uri=lb://odrzavanje
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/maintenanceLog/**

# Routes - Smestaj reservations
spring.cloud.gateway.routes[13].id=smestaj-reserve
spring.cloud.gateway.routes[13].uri=lb://smestaj-mikroservis
spring.cloud.gateway.routes[13].predicates[0]=Path=/api/reserve/**

# Routes - Smestaj price tiers
spring.cloud.gateway.routes[14].id=smestaj-pricetiers
spring.cloud.gateway.routes[14].uri=lb://smestaj-mikroservis
spring.cloud.gateway.routes[14].predicates[0]=Path=/api/priceTiers/**

# ---

# FINANCES SERVIS - transactions
spring.cloud.gateway.routes[4].id=finances-transactions
spring.cloud.gateway.routes[4].uri=http://finance-service:8080
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/transactions/**

# FINANCES SERVIS - invoices
spring.cloud.gateway.routes[5].id=finances-invoices
spring.cloud.gateway.routes[5].uri=http://finance-service:8080
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/invoices/**

# FINANCES SERVIS - payment methods
spring.cloud.gateway.routes[6].id=finances-payment-methods
spring.cloud.gateway.routes[6].uri=http://finance-service:8080
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/payment-methods/**

# FINANCES SERVIS - tax rates
spring.cloud.gateway.routes[7].id=finances-tax-rates
spring.cloud.gateway.routes[7].uri=http://finance-service:8080
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/tax-rates/**

# BOOKINGS SERVIS - bookings
spring.cloud.gateway.routes[8].id=bookings-bookings
spring.cloud.gateway.routes[8].uri=http://booking-service:8084
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/bookings/**

# BOOKINGS SERVIS - booking status logs
spring.cloud.gateway.routes[9].id=bookings-status-logs
spring.cloud.gateway.routes[9].uri=http://booking-service:8084
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/booking-status-logs/**

# BOOKINGS SERVIS - cancellation policies
spring.cloud.gateway.routes[10].id=bookings-cancellation-policies
spring.cloud.gateway.routes[10].uri=http://booking-service:8084
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/cancellation-policies/**

# BOOKINGS SERVIS - guests
spring.cloud.gateway.routes[11].id=bookings-guests
spring.cloud.gateway.routes[11].uri=http://booking-service:8084
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/guests/**

#ADVENTURES
spring.cloud.gateway.routes[15].id=avanture-service
spring.cloud.gateway.routes[15].uri=lb://avanture-service
spring.cloud.gateway.routes[15].predicates[0]=Path=/api/avanture/**

# GUIDES
spring.cloud.gateway.routes[16].id=vodici-service
spring.cloud.gateway.routes[16].uri=lb://vodici-service
spring.cloud.gateway.routes[16].predicates[0]=Path=/api/vodici/**

# AUTH SERVICE - registration and auth endpoints (no API key required)
spring.cloud.gateway.routes[17].id=auth-service
spring.cloud.gateway.routes[17].uri=http://authservice:8085
spring.cloud.gateway.routes[17].predicates[0]=Path=/api/auth/**

# CORS
spring.cloud.gateway.globalcors.add-to-idp-col-mappings=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:8080, http://localhost:8081, http://localhost:8082, http://localhost:8086,http://localhost:8087
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*


springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

#Spring dokumentacija
springdoc.swagger-ui.urls[0].name=Avanture Service
springdoc.swagger-ui.urls[0].url=/api/avanture/v3/api-docs

springdoc.swagger-ui.urls[1].name=Vodici Service
springdoc.swagger-ui.urls[1].url=/api/vodici/v3/api-docs

# Actuator
management.endpoints.web.exposure.include=gateway,health,refresh
management.endpoint.gateway.enabled=true

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
management.tracing.propagation.type=w3c
spring.cloud.loadbalancer.retry.enabled=true
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/
eureka.instance.prefer-ip-address=true
