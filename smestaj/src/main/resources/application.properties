spring.application.name=smestaj-mikroservis
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.fail-fast=false

management.tracing.sampling.probability=1.0


#How refresh works:
#1. Edit config file, call POST http://localhost:8081/actuator/refresh
#2. Spring Cloud updates the Environment, then clears all @RefreshScope beans
#3. RefreshScopeRefreshedEvent fires ? UnitApplication.onRefresh() runs ? accesses rateLimiterRefreshListener.apply()
#via the scope proxy ? Spring recreates the bean with new @Value values ? @PostConstruct runs ?
#changeLimitForPeriod(newLimit) is called immediately
#
#The @EventListener in the Application class is just 3 lines ? its only job is to trigger the @RefreshScope bean
#eagerly so the update happens right at refresh time, not lazily on the next request.
